name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller certifi python-docx reportlab faster-whisper
          pip install llama-cpp-python
        shell: pwsh

      - name: Download ffmpeg for Windows
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/6.1.1/ffmpeg-6.1.1-essentials_build.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffmpegExe = Get-ChildItem -Recurse ffmpeg_tmp -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName backend\ffmpeg.exe
        shell: pwsh

      - name: Build Python backend with PyInstaller
        run: |
          cd backend
          pyinstaller `
            --onefile `
            --name ablo-backend `
            --collect-all faster_whisper `
            --collect-all ctranslate2 `
            --collect-all tokenizers `
            --hidden-import llama_cpp `
            --add-binary "ffmpeg.exe;." `
            main.py
          New-Item -ItemType Directory -Force -Path ..\src-tauri\binaries | Out-Null
          Copy-Item dist\ablo-backend.exe ..\src-tauri\binaries\ablo-backend-x86_64-pc-windows-msvc.exe
        shell: pwsh

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ablo-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
