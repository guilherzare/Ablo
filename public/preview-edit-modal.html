<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prévisualisation Modale Édition</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 32px 16px;
      display: flex;
      justify-content: center;
    }
    .page { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 8px; }
    .page-title { font-size: 0.75rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; margin: 0 0 16px; }

    /* ── Modal shell ── */
    .modal {
      background: #fff; border-radius: 14px; padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      display: flex; flex-direction: column; gap: 20px;
    }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .modal-eyebrow { font-size: 0.7rem; font-weight: 600; color: #4f46e5; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 2px; }
    .modal-title { font-size: 1.15rem; font-weight: 700; color: #1a1a2e; margin: 0; }
    .modal-close { background: none; border: none; font-size: 1rem; color: #9ca3af; cursor: pointer; padding: 4px 8px; border-radius: 6px; }

    /* ── Sections ── */
    .edit-section { display: flex; flex-direction: column; gap: 6px; }
    .edit-label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin: 0; }
    .optional-badge { font-size: 0.72rem; font-weight: 500; color: #9ca3af; background: #f3f4f6; padding: 2px 7px; border-radius: 99px; margin-left: 6px; text-transform: none; letter-spacing: 0; }
    .edit-date {
      padding: 8px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 0.9rem; font-family: inherit; color: #1a1a2e;
      background: #f9fafb; width: fit-content;
    }
    .edit-textarea {
      padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 0.9rem; font-family: inherit; color: #1a1a2e;
      background: #f9fafb; resize: vertical; line-height: 1.6;
    }
    .edit-textarea--large { min-height: 100px; }

    /* ── AutoEvalEditor ── */
    .auteval { display: flex; flex-direction: column; gap: 14px; padding: 4px 0; }
    .auteval-row { display: flex; align-items: center; gap: 12px; }
    .auteval-label { flex: 0 0 130px; font-size: 0.875rem; color: #374151; font-weight: 500; }
    .auteval-input-wrap { display: flex; align-items: center; gap: 8px; }
    .auteval-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .auteval-input {
      width: 64px; padding: 5px 8px; border: 1px solid #d1d5db; border-radius: 7px;
      font-size: 0.95rem; font-weight: 600; font-family: inherit;
      color: #1a1a2e; background: #fff; text-align: center;
    }
    .auteval-input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .auteval-unit { font-size: 0.8rem; color: #9ca3af; font-weight: 500; }
    .auteval-na-value { font-size: 0.95rem; font-weight: 600; color: #d1d5db; width: 64px; text-align: center; display: inline-block; }
    .auteval-na-btn {
      margin-left: auto; padding: 3px 9px; border: 1px solid #e5e7eb;
      border-radius: 5px; font-size: 0.72rem; font-family: inherit;
      font-weight: 500; color: #9ca3af; background: #fff; cursor: pointer;
    }
    .auteval-na-btn:hover { background: #f3f4f6; border-color: #d1d5db; color: #374151; }
    .auteval-na-btn.active { background: #f3f4f6; border-color: #d1d5db; color: #374151; font-weight: 600; }

    /* ── Footer ── */
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding-top: 4px; border-top: 1px solid #f3f4f6; }
    .btn-cancel { padding: 8px 18px; background: none; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; font-family: inherit; color: #6b7280; cursor: pointer; }
    .btn-save { padding: 8px 20px; background: #4f46e5; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; font-family: inherit; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="page">
    <p class="page-title">Prévisualisation — Modale d'édition de séance</p>

    <div class="modal">
      <div class="modal-header">
        <div>
          <p class="modal-eyebrow">Séance 3</p>
          <h2 class="modal-title">Modifier la séance</h2>
        </div>
        <button class="modal-close">✕</button>
      </div>

      <div class="edit-section">
        <label class="edit-label">Date de la séance</label>
        <input type="date" class="edit-date" value="2025-04-12" />
      </div>

      <div class="edit-section">
        <label class="edit-label">Résumé de la séance</label>
        <textarea class="edit-textarea edit-textarea--large" rows="5" spellcheck="true" lang="fr">Séance centrée sur le modelage argile. Marie a travaillé sur une forme abstraite représentant ses émotions. Bonne concentration et engagement dans la tâche. Retour positif en fin de séance.</textarea>
      </div>

      <div class="edit-section">
        <label class="edit-label">Notes du thérapeute <span class="optional-badge">optionnel</span></label>
        <textarea class="edit-textarea" rows="3" spellcheck="true" lang="fr">Observer l'évolution de la relation au corps dans les prochaines séances.</textarea>
      </div>

      <div class="edit-section">
        <p class="edit-label">Autoévaluation du patient</p>
        <div class="auteval" id="auteval-form"></div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel">Annuler</button>
        <button class="btn-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
    const CRITERIA = ["État initial", "Envie de revenir", "Bien fait", "Beau", "Bon moment", "État final"];
    const INIT = [0.5, 1.5, null, 3.8, 4, 4.9];
    const state = [...INIT];

    function scoreColor(v) {
      const h = (v / 5) * 120;
      const l = 52 - (v / 5) * 12;
      return `hsl(${h.toFixed(1)}, 85%, ${Math.round(l)}%)`;
    }
    function parseInput(raw) {
      const n = parseFloat(raw.replace(",", "."));
      return isNaN(n) ? null : Math.min(5, Math.max(0, Math.round(n * 10) / 10));
    }

    function render() {
      const wrap = document.getElementById("auteval-form");
      wrap.innerHTML = "";
      CRITERIA.forEach((label, i) => {
        const isNA = state[i] === null;
        const val = isNA ? 0 : state[i];
        const row = document.createElement("div");
        row.className = "auteval-row";
        row.innerHTML = `
          <span class="auteval-label">${label}</span>
          <div class="auteval-input-wrap">
            <span class="auteval-dot" id="dot-${i}" style="background:${isNA ? '#d1d5db' : scoreColor(val)}"></span>
            ${isNA
              ? `<span class="auteval-na-value">—</span>`
              : `<input type="text" inputmode="decimal" class="auteval-input"
                   value="${val}" placeholder="0"
                   oninput="handleInput(this,${i})" onblur="handleBlur(this,${i})">
                 <span class="auteval-unit">/5</span>`
            }
          </div>
          <button type="button" class="auteval-na-btn${isNA ? ' active' : ''}" onclick="toggleNA(${i})">
            ${isNA ? 'Évaluer' : 'N/A'}
          </button>`;
        wrap.appendChild(row);
      });
    }

    function handleInput(input, i) {
      const replaced = input.value.replace(",", ".");
      if (replaced !== input.value) { input.value = replaced; }
      const n = parseInput(input.value);
      if (n !== null) document.getElementById(`dot-${i}`).style.background = scoreColor(n);
    }
    function handleBlur(input, i) {
      const n = parseInput(input.value) ?? 0;
      state[i] = n;
      input.value = String(n);
      document.getElementById(`dot-${i}`).style.background = scoreColor(n);
    }
    function toggleNA(i) {
      state[i] = state[i] === null ? 0 : null;
      render();
    }

    render();
  </script>
</body>
</html>
