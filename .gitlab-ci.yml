stages:
  - build

build-windows:
  stage: build
  tags:
    - saas-windows-medium-amd64
  script:
    # ── Python + dépendances ──────────────────────────────────────────────
    - python -m pip install --upgrade pip
    - pip install pyinstaller certifi python-docx reportlab faster-whisper
    - $env:CMAKE_ARGS = "-DLLAMA_BLAS=OFF -DLLAMA_CUDA=OFF -DLLAMA_METAL=OFF"
    - pip install llama-cpp-python

    # ── ffmpeg Windows ───────────────────────────────────────────────────
    - $url = "https://github.com/GyanD/codexffmpeg/releases/download/6.1.1/ffmpeg-6.1.1-essentials_build.zip"
    - Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
    - Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
    - $ffmpegExe = Get-ChildItem -Recurse ffmpeg_tmp -Filter "ffmpeg.exe" | Select-Object -First 1
    - Copy-Item $ffmpegExe.FullName backend\ffmpeg.exe

    # ── Backend Python → .exe ────────────────────────────────────────────
    - cd backend
    - >
      pyinstaller
      --onefile
      --name ablo-backend
      --collect-all faster_whisper
      --collect-all ctranslate2
      --collect-all tokenizers
      --collect-all llama_cpp
      --add-binary "ffmpeg.exe;."
      --add-data "..\templates;templates"
      main.py
    - New-Item -ItemType Directory -Force -Path ..\src-tauri\binaries | Out-Null
    - Copy-Item dist\ablo-backend.exe ..\src-tauri\binaries\ablo-backend-x86_64-pc-windows-msvc.exe
    - cd ..

    # ── Vérification taille binaire ──────────────────────────────────────
    - |
      $bin = "src-tauri\binaries\ablo-backend-x86_64-pc-windows-msvc.exe"
      if (-not (Test-Path $bin)) { Write-Error "Backend introuvable"; exit 1 }
      $sizeMB = [math]::Round((Get-Item $bin).Length / 1MB, 1)
      Write-Host "Backend : $sizeMB Mo"
      if ((Get-Item $bin).Length -lt 30MB) { Write-Error "Binaire trop petit"; exit 1 }

    # ── Node + npm ───────────────────────────────────────────────────────
    - node --version
    - npm install

    # ── Rust ─────────────────────────────────────────────────────────────
    - rustup target add x86_64-pc-windows-msvc

    # ── Build Tauri ───────────────────────────────────────────────────────
    - npm run tauri build

    # ── Vérification installeur ───────────────────────────────────────────
    - |
      $nsisDir = "src-tauri\target\release\bundle\nsis"
      $installer = Get-ChildItem $nsisDir -Filter "*.exe" | Select-Object -First 1
      if ($null -eq $installer) { Write-Error "Pas d'installeur NSIS"; exit 1 }
      $sizeMB = [math]::Round($installer.Length / 1MB, 1)
      Write-Host "Installeur : $($installer.Name) ($sizeMB Mo)"

  artifacts:
    name: "ablo-windows-$CI_COMMIT_SHORT_SHA"
    paths:
      - src-tauri/target/release/bundle/nsis/*.exe
      - src-tauri/target/release/bundle/msi/*.msi
    expire_in: 30 days
    when: on_success

  # Lance uniquement sur main ou manuellement
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: manual
